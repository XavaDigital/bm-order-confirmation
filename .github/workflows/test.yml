name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test:unit

      - run: npm run test:integration

      # Non-blocking report — coverage.thresholds can be added once gaps are closed.
      - run: npm run coverage
        continue-on-error: true

      # Non-blocking for now: drizzle-orm <0.45.2 has a known high-severity
      # SQL-injection advisory (GHSA-gpj5-g38j-94v9) whose fix is a breaking
      # 0.38->0.45 upgrade tracked separately. Flip continue-on-error off once
      # that lands so future high+ vulnerabilities actually fail the build.
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
